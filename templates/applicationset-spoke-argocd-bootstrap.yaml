{{- range .Values.applicationSets }}
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: {{ .name }}
  namespace: {{ $.Values.global.namespace }}
spec:
  goTemplate: true
  goTemplateOptions:
    # missingkey=zero: render an empty string for missing map keys rather than erroring.
    # Required because local-cluster's generator context does not populate .metadata.
    - missingkey=zero
  generators:
    - clusterDecisionResource:
        configMapRef: acm-placement
        labelSelector:
          matchLabels:
            cluster.open-cluster-management.io/placement: {{ .placement }}
        requeueAfterSeconds: {{ .requeueAfterSeconds }}
  template:
    metadata:
      name: platform-bootstrap-{{`{{.name}}`}}
    spec:
      project: default
      source:
        repoURL: {{ $.Values.global.helmCatalogRepoURL | quote }}
        path: {{ $.Values.spokeArgoCDBootstrap.chart }}
        # All ApplicationSets use "main" as the chart revision.
        # Pin to a specific tag per ApplicationSet via targetRevision in values.yaml if needed.
        targetRevision: main
        helm:
          values: |
            org: {{ $.Values.org }}
            clusterName: {{`{{.name}}`}}
            # clusterType and region are sourced from values.yaml (Git) — same for every cluster
            # in this ApplicationSet. This makes the mapping auditable and avoids relying on
            # ManagedCluster label propagation to Argo CD cluster secrets (which is not guaranteed).
            clusterType: {{ .clusterType }}
            # clusterGroup is derived from the ManagedCluster name — always available in the
            # generator context as .name. Convention: ManagedCluster name == clusterGroup.
            clusterGroup: {{`{{.name}}`}}
            region: {{ .region }}
            platformAppsRepoURL: {{ $.Values.global.platformAppsRepoURL }}
            platformConfigRepoURL: {{ $.Values.global.platformConfigRepoURL }}
            platform:
              version: main
            {{- range $k, $v := .extraValues }}
            {{ $k }}: {{ $v }}
            {{- end }}
      destination:
        server: '{{`{{.server}}`}}'
        namespace: {{ $.Values.spokeArgoCDBootstrap.destinationNamespace }}
      syncPolicy:
        automated:
          selfHeal: true
          # prune: controls whether this bootstrap Application is deleted when the cluster
          # loses its placement label. Set to false for prod to prevent accidental teardown.
          prune: {{ .prune | default false }}
        syncOptions:
          - CreateNamespace=true
          # On a brand new spoke the argoproj.io Application CRD does not exist yet.
          # Without this option the dry-run for the root Application CR fails and aborts
          # the entire sync before the Subscription is ever applied — the operator never
          # installs. SkipDryRunOnMissingResource bypasses dry-run for unknown CRDs so
          # the Subscription reaches the cluster on the first attempt. selfHeal then
          # retries wave 1 once the operator has installed and registered the CRD (~2-3 min).
          - SkipDryRunOnMissingResource=true
{{- end }}
