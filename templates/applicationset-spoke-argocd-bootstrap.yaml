{{- range .Values.applicationSets }}
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: {{ .name }}
  namespace: {{ $.Values.global.namespace }}
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=zero
  generators:
    - clusterDecisionResource:
        configMapRef: acm-placement
        labelSelector:
          matchLabels:
            cluster.open-cluster-management.io/placement: {{ .placement }}
        requeueAfterSeconds: {{ .requeueAfterSeconds }}
  template:
    metadata:
      name: platform-bootstrap-{{`{{.name}}`}}
    spec:
      project: default
      source:
        repoURL: {{ $.Values.global.helmCatalogRepoURL | quote }}
        path: {{ $.Values.spokeArgoCDBootstrap.chart }}
        targetRevision: '{{`{{if .metadata}}{{index .metadata.labels "platform/version" | default "main"}}{{else}}main{{end}}`}}'
        helm:
          values: |
            org: {{ $.Values.org }}
            clusterName: {{`{{.name}}`}}
            clusterType: {{`{{if .metadata}}{{index .metadata.labels "platform/clusterType"}}{{end}}`}}
            clusterGroup: {{`{{if .metadata}}{{index .metadata.labels "platform/clusterGroup"}}{{end}}`}}
            region: {{`{{if .metadata}}{{index .metadata.labels "platform/region"}}{{end}}`}}
            platformAppsRepoURL: {{ $.Values.global.platformAppsRepoURL }}
            platformConfigRepoURL: {{ $.Values.global.platformConfigRepoURL }}
            platform:
              version: {{`{{if .metadata}}{{index .metadata.labels "platform/version" | default "main"}}{{else}}main{{end}}`}}
            {{- range $k, $v := .extraValues }}
            {{ $k }}: {{ $v }}
            {{- end }}
      destination:
        server: '{{`{{.server}}`}}'
        namespace: {{ $.Values.spokeArgoCDBootstrap.destinationNamespace }}
      syncPolicy:
        syncOptions:
          - CreateNamespace=true
{{- end }}
