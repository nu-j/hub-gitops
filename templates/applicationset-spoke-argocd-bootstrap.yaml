{{- range .Values.applicationSets }}
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: {{ .name }}
  namespace: {{ $.Values.global.namespace }}
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - clusterDecisionResource:
        configMapRef: acm-placement
        labelSelector:
          matchLabels:
            cluster.open-cluster-management.io/placement: {{ .placement }}
        requeueAfterSeconds: {{ .requeueAfterSeconds }}
  template:
    metadata:
      name: platform-bootstrap-{{`{{.name}}`}}
    spec:
      project: default
      source:
        repoURL: {{ $.Values.global.helmCatalogRepoURL | quote }}
        path: {{ $.Values.spokeArgoCDBootstrap.chart }}
        targetRevision: '{{`{{index .metadata.labels "platform/version" | default "main"}}`}}'
        helm:
          values: |
            org: {{ $.Values.org }}
            clusterName: {{`{{.name}}`}}
            clusterType: {{`{{index .metadata.labels "platform/clusterType"}}`}}
            clusterGroup: {{`{{index .metadata.labels "platform/clusterGroup"}}`}}
            region: {{`{{index .metadata.labels "platform/region"}}`}}
            platformAppsRepoURL: {{ $.Values.global.platformAppsRepoURL }}
            platformConfigRepoURL: {{ $.Values.global.platformConfigRepoURL }}
            platform:
              version: {{`{{index .metadata.labels "platform/version" | default "main"}}`}}
            {{- range $k, $v := .extraValues }}
            {{ $k }}: {{ $v }}
            {{- end }}
      destination:
        server: '{{`{{.server}}`}}'
        namespace: {{ $.Values.spokeArgoCDBootstrap.destinationNamespace }}
      syncPolicy:
        syncOptions:
          - CreateNamespace=true
{{- end }}
