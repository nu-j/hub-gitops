global:
  helmCatalogRepoURL: https://github.com/nu-j/helm-catalog.git
  platformAppsRepoURL: https://github.com/nu-j/platform-apps.git
  platformConfigRepoURL: https://github.com/nu-j/platform-config.git
  namespace: openshift-gitops
  argoServerCluster: local-cluster

# Organisation name — prefixed to generated Application names (e.g. acme-spoke-root-aoa)
org: acme

# ── ManagedClusterSets ────────────────────────────────────────────────────────
# One ManagedClusterSet + ManagedClusterSetBinding is created per entry.
# Split by environment so each tier has its own cluster boundary and prune policy.
#
# After deploying, join spoke clusters to the correct set with:
#   oc label managedcluster <name> \
#     cluster.open-cluster-management.io/clusterset=<set-name>
clusterSets:
  - name: dev       # development ROSA spokes
  - name: preprod   # pre-production ROSA spokes
  - name: prod      # production ROSA spokes
  - name: management  # hub cluster (local-cluster) — not a ROSA spoke

# ── Placements ────────────────────────────────────────────────────────────────
# Each Placement selects clusters from its clusterSet by the platform/clusterType label.
# A GitOpsCluster is also created per entry to register matched clusters in hub Argo CD.
placements:
  - name: placement-dev
    clusterSet: dev
    clusterTypes:
      - dev

  - name: placement-preprod
    clusterSet: preprod
    clusterTypes:
      - preprod

  - name: placement-prod
    clusterSet: prod
    clusterTypes:
      - prod

  - name: placement-management
    clusterSet: management
    clusterTypes:
      - management

# ── ApplicationSets ───────────────────────────────────────────────────────────
# One ApplicationSet is created per entry. Each fans out the spoke-argocd-bootstrap chart
# to every cluster matched by its placement.
#
# prune: true  — when a cluster label is removed, the bootstrap Application is automatically
#                deleted. Suitable for dev and preprod where cleanup should be automatic.
# prune: false — the bootstrap Application is LEFT in place even if the cluster label is
#                removed. Recommended for prod to prevent accidental teardown.
#
# extraValues: optional key/value pairs injected into the bootstrap chart's Helm values.
#              Use this to override defaults that cannot be derived from cluster labels
#              (e.g. disabling GitOps installation on a hub that already has it).
applicationSets:
  - name: bootstrap-dev
    placement: placement-dev
    # clusterType and region are baked into the ApplicationSet — all clusters onboarded here
    # are provably dev in eu-west-1. Change requires a Git commit and PR.
    clusterType: dev
    region: eu-west-1
    requeueAfterSeconds: 180
    prune: true   # dev: auto-prune is safe

  - name: bootstrap-preprod
    placement: placement-preprod
    clusterType: preprod
    region: eu-west-1
    requeueAfterSeconds: 180
    prune: true   # preprod: auto-prune enabled — validate before promoting to prod

  - name: bootstrap-prod
    placement: placement-prod
    clusterType: prod
    region: eu-west-1
    requeueAfterSeconds: 180
    prune: false  # prod: NEVER auto-prune — removals require deliberate manual action

  - name: hub-self-management
    placement: placement-management
    clusterType: management
    region: eu-west-1
    requeueAfterSeconds: 180
    prune: true   # management cluster manages itself; prune is safe — removing the label stops self-management
    extraValues:
      # Management cluster already has GitOps installed — skip the operator subscription
      installOpenShiftGitOps: false
      # ManagedCluster name for the management cluster is "local-cluster", not "eng-hub".
      # Override clusterGroup explicitly so the correct clusterdef.yaml path is resolved.
      clusterGroup: eng-hub

# ── Bootstrap chart reference ─────────────────────────────────────────────────
# Chart path within the helmCatalogRepoURL used by all ApplicationSets above.
spokeArgoCDBootstrap:
  chart: spoke-argocd-bootstrap
  destinationNamespace: openshift-gitops
